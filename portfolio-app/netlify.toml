[build]
  command = "npm run build"
  publish = "dist"

# Yahoo Finance — proxy principal
[[redirects]]
  from = "/yahoo/*"
  to = "https://query1.finance.yahoo.com/:splat"
  status = 200
  force = true

# Yahoo Finance — fallback query2 (si query1 falla)
[[redirects]]
  from = "/yahoo2/*"
  to = "https://query2.finance.yahoo.com/:splat"
  status = 200
  force = true

# Yahoo search
[[redirects]]
  from = "/yahoo-search/*"
  to = "https://query1.finance.yahoo.com/:splat"
  status = 200
  force = true

# Yahoo autocomplete
[[redirects]]
  from = "/yahoo-ac"
  to = "https://autoc.finance.yahoo.com/autoc:splat"
  status = 200
  force = true

# CoinGecko — proxy per evitar CORS i rate limiting
[[redirects]]
  from = "/coingecko/*"
  to = "https://api.coingecko.com/:splat"
  status = 200
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200