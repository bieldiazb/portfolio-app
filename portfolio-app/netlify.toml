[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/yahoo/*"
  to = "https://query1.finance.yahoo.com/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/yahoo-search/*"
  to = "https://query1.finance.yahoo.com/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/yahoo-ac"
  to = "https://autoc.finance.yahoo.com/autoc:splat"
  status = 200
  force = true