[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Yahoo Finance — proxy principal
[[redirects]]
  from = "/yahoo/*"
  to = "https://query1.finance.yahoo.com/:splat"
  status = 200
  force = true

# Yahoo Finance — fallback query2
[[redirects]]
  from = "/yahoo2/*"
  to = "https://query2.finance.yahoo.com/:splat"
  status = 200
  force = true

# Yahoo search
[[redirects]]
  from = "/yahoo-search/*"
  to = "https://query1.finance.yahoo.com/:splat"
  status = 200
  force = true

# Yahoo autocomplete
[[redirects]]
  from = "/yahoo-ac"
  to = "https://autoc.finance.yahoo.com/autoc:splat"
  status = 200
  force = true

# CoinGecko — proxy per evitar CORS
[[redirects]]
  from = "/coingecko/*"
  to = "https://api.coingecko.com/:splat"
  status = 200
  force = true

# Claude API — Netlify Function (injecta x-api-key del servidor)
[[redirects]]
  from = "/claude/*"
  to = "/.netlify/functions/claude"
  status = 200
  force = true

# Financial Modeling Prep — Netlify Function (injecta FMP_API_KEY del servidor)
# IMPORTANT: usem :splat per passar el path sencer a la function
[[redirects]]
  from = "/fmp"
  to = "/.netlify/functions/fmp"
  status = 200
  force = true

[[redirects]]
  from = "/fmp/*"
  to = "/.netlify/functions/fmp"
  status = 200
  force = true

# Alpha Vantage — proxy (injecta ALPHA_VANTAGE_KEY)
[[redirects]]
  from = "/av"
  to = "/.netlify/functions/alphavantage"
  status = 200
  force = true

# Finnhub — proxy (injecta FINNHUB_API_KEY) — 60 crides/minut gratuïtes
[[redirects]]
  from = "/fh"
  to = "/.netlify/functions/finnhub"
  status = 200
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200