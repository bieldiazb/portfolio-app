[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Yahoo Finance — gestionat directament per la Function via config.path
# (els redirects no cal, la function intercepta /yahoo/*, /yahoo2/*, /yahoo-search/*)

# Yahoo autocomplete (redirect simple, no necessita User-Agent)
[[redirects]]
  from = "/yahoo-ac"
  to = "https://autoc.finance.yahoo.com/autoc:splat"
  status = 200
  force = true

# CoinGecko
[[redirects]]
  from = "/coingecko/*"
  to = "https://api.coingecko.com/:splat"
  status = 200
  force = true

# Claude API
[[redirects]]
  from = "/claude/*"
  to = "/.netlify/functions/claude"
  status = 200
  force = true

# Financial Modeling Prep
[[redirects]]
  from = "/fmp"
  to = "/.netlify/functions/fmp"
  status = 200
  force = true

[[redirects]]
  from = "/fmp/*"
  to = "/.netlify/functions/fmp"
  status = 200
  force = true

# Alpha Vantage
[[redirects]]
  from = "/av"
  to = "/.netlify/functions/alphavantage"
  status = 200
  force = true

# Finnhub
[[redirects]]
  from = "/fh"
  to = "/.netlify/functions/finnhub"
  status = 200
  force = true

# SPA fallback — ha d'anar sempre al final
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200